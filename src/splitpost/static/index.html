<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SplitPost</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=JetBrains+Mono:wght@300;400;500;600&family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}

:root {
  --bg: #08080a;
  --bg-elevated: #111114;
  --bg-card: #16161a;
  --bg-input: #1a1a1f;
  --border: #2a2a30;
  --border-focus: #3a3a44;
  --text: #e8e6e3;
  --text-dim: #8a8a8e;
  --text-muted: #5a5a5e;
  --accent: #ff6b35;
  --twitter: #1DA1F2;
  --linkedin: #0A66C2;
  --instagram-1: #F77737;
  --instagram-2: #C13584;
  --instagram-3: #833AB4;
  --telegram: #26A5E4;
  --tiktok-cyan: #25F4EE;
  --tiktok-pink: #FE2C55;
  --success: #34d399;
  --warning: #fbbf24;
  --danger: #f87171;
  --radius: 10px;
  --radius-sm: 6px;
  --font-display: 'Syne', sans-serif;
  --font-mono: 'JetBrains Mono', monospace;
  --font-body: 'Space Grotesk', sans-serif;
}

html { font-size: 15px; }
body {
  font-family: var(--font-body);
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  overflow-x: hidden;
  -webkit-font-smoothing: antialiased;
}

/* ═══ NOISE TEXTURE OVERLAY ═══ */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  opacity: 0.035;
  pointer-events: none;
  z-index: 9999;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
}

/* ═══ SCROLLBAR ═══ */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: var(--text-muted); }

/* ═══ AUTH SCREEN ═══ */
.auth-screen {
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  position: relative;
  overflow: hidden;
}

.auth-bg {
  position: absolute;
  inset: 0;
  background:
    radial-gradient(ellipse 800px 600px at 20% 30%, rgba(29,161,242,0.06), transparent),
    radial-gradient(ellipse 600px 800px at 80% 70%, rgba(254,44,85,0.05), transparent),
    radial-gradient(ellipse 700px 500px at 50% 50%, rgba(255,107,53,0.04), transparent);
}

.auth-grid-lines {
  position: absolute;
  inset: 0;
  background-image:
    linear-gradient(rgba(255,255,255,0.02) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,255,255,0.02) 1px, transparent 1px);
  background-size: 60px 60px;
}

.auth-container {
  position: relative;
  width: 420px;
  max-width: 90vw;
  animation: authIn 0.8s cubic-bezier(0.16, 1, 0.3, 1);
}

@keyframes authIn {
  from { opacity: 0; transform: translateY(30px) scale(0.96); }
  to { opacity: 1; transform: translateY(0) scale(1); }
}

.auth-logo {
  text-align: center;
  margin-bottom: 48px;
}

.auth-logo h1 {
  font-family: var(--font-display);
  font-weight: 800;
  font-size: 2.8rem;
  letter-spacing: -2px;
  background: linear-gradient(135deg, var(--text) 0%, var(--text-dim) 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  margin-bottom: 8px;
}

.auth-logo .tagline {
  font-family: var(--font-mono);
  font-size: 0.75rem;
  color: var(--text-muted);
  letter-spacing: 2px;
  text-transform: uppercase;
}

.auth-box {
  background: var(--bg-elevated);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 36px;
}

.auth-tabs {
  display: flex;
  gap: 0;
  margin-bottom: 28px;
  border-bottom: 1px solid var(--border);
}

.auth-tab {
  flex: 1;
  padding: 12px 0;
  background: none;
  border: none;
  color: var(--text-muted);
  font-family: var(--font-body);
  font-size: 0.9rem;
  font-weight: 500;
  cursor: pointer;
  position: relative;
  transition: color 0.3s;
}

.auth-tab.active {
  color: var(--text);
}

.auth-tab.active::after {
  content: '';
  position: absolute;
  bottom: -1px;
  left: 0;
  right: 0;
  height: 2px;
  background: var(--accent);
}

.form-group {
  margin-bottom: 18px;
}

.form-group label {
  display: block;
  font-family: var(--font-mono);
  font-size: 0.7rem;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: 1.5px;
  margin-bottom: 8px;
}

.form-group input {
  width: 100%;
  padding: 12px 14px;
  background: var(--bg-input);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  color: var(--text);
  font-family: var(--font-body);
  font-size: 0.9rem;
  transition: border-color 0.2s, box-shadow 0.2s;
  outline: none;
}

.form-group input:focus {
  border-color: var(--accent);
  box-shadow: 0 0 0 3px rgba(255,107,53,0.1);
}

.form-group input::placeholder {
  color: var(--text-muted);
}

.btn-primary {
  width: 100%;
  padding: 14px;
  background: var(--accent);
  color: #fff;
  border: none;
  border-radius: var(--radius-sm);
  font-family: var(--font-display);
  font-weight: 700;
  font-size: 0.95rem;
  letter-spacing: 0.5px;
  cursor: pointer;
  transition: all 0.2s;
  margin-top: 8px;
  position: relative;
  overflow: hidden;
}

.btn-primary:hover {
  background: #ff7d4d;
  transform: translateY(-1px);
  box-shadow: 0 4px 20px rgba(255,107,53,0.3);
}

.btn-primary:active { transform: translateY(0); }

.btn-primary.loading {
  pointer-events: none;
  color: transparent;
}

.btn-primary.loading::after {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
  animation: shimmer 1.5s infinite;
}

@keyframes shimmer {
  0% { transform: translateX(-100%); }
  100% { transform: translateX(100%); }
}

/* ═══ MAIN LAYOUT ═══ */
.app-layout {
  min-height: 100vh;
}

/* ═══ SIDEBAR ═══ */
.sidebar {
  background: var(--bg-elevated);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  padding: 24px 0;
  position: fixed;
  top: 0;
  left: 0;
  bottom: 0;
  width: 220px;
  z-index: 100;
}

.sidebar-logo {
  padding: 0 24px;
  margin-bottom: 36px;
}

.sidebar-logo h2 {
  font-family: var(--font-display);
  font-weight: 800;
  font-size: 1.5rem;
  letter-spacing: -1px;
}

.sidebar-logo span {
  color: var(--accent);
}

.sidebar-nav {
  flex: 1;
}

.nav-item {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 11px 24px;
  color: var(--text-dim);
  cursor: pointer;
  transition: all 0.15s;
  font-size: 0.9rem;
  font-weight: 500;
  border-left: 3px solid transparent;
  user-select: none;
}

.nav-item:hover {
  color: var(--text);
  background: rgba(255,255,255,0.03);
}

.nav-item.active {
  color: var(--text);
  background: rgba(255,107,53,0.06);
  border-left-color: var(--accent);
}

.nav-item .icon {
  font-size: 1.05rem;
  width: 22px;
  text-align: center;
}

.sidebar-user {
  padding: 16px 24px;
  border-top: 1px solid var(--border);
  display: flex;
  align-items: center;
  gap: 12px;
}

.user-avatar {
  width: 34px;
  height: 34px;
  border-radius: 50%;
  background: linear-gradient(135deg, var(--accent), #ff9966);
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: var(--font-display);
  font-weight: 700;
  font-size: 0.8rem;
  color: #fff;
  flex-shrink: 0;
}

.user-info {
  overflow: hidden;
}

.user-name {
  font-size: 0.85rem;
  font-weight: 600;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.user-signout {
  font-family: var(--font-mono);
  font-size: 0.65rem;
  color: var(--text-muted);
  cursor: pointer;
  transition: color 0.15s;
}

.user-signout:hover { color: var(--danger); }

/* ═══ MAIN CONTENT ═══ */
.main-content {
  margin-left: 220px;
  padding: 32px 40px;
  min-height: 100vh;
}

.page-header {
  margin-bottom: 32px;
}

.page-header h1 {
  font-family: var(--font-display);
  font-weight: 800;
  font-size: 2rem;
  letter-spacing: -1px;
  margin-bottom: 6px;
}

.page-header p {
  color: var(--text-dim);
  font-size: 0.9rem;
}

/* ═══ SPLIT COMPOSER ═══ */
.composer {
  background: var(--bg-elevated);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 28px;
  margin-bottom: 28px;
}

.composer-textarea {
  width: 100%;
  min-height: 160px;
  background: var(--bg-input);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 18px;
  color: var(--text);
  font-family: var(--font-body);
  font-size: 0.95rem;
  line-height: 1.65;
  resize: vertical;
  outline: none;
  transition: border-color 0.2s;
}

.composer-textarea:focus {
  border-color: var(--accent);
}

.composer-textarea::placeholder {
  color: var(--text-muted);
}

.composer-char-count {
  text-align: right;
  font-family: var(--font-mono);
  font-size: 0.7rem;
  color: var(--text-muted);
  margin-top: 6px;
}

.composer-options {
  display: flex;
  flex-wrap: wrap;
  gap: 20px;
  margin-top: 22px;
  align-items: flex-start;
}

.option-group {
  flex: 1;
  min-width: 200px;
}

.option-label {
  font-family: var(--font-mono);
  font-size: 0.65rem;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: 1.5px;
  margin-bottom: 10px;
}

/* Tone selector */
.tone-chips {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
}

.tone-chip {
  padding: 7px 14px;
  border: 1px solid var(--border);
  border-radius: 20px;
  background: transparent;
  color: var(--text-dim);
  font-family: var(--font-body);
  font-size: 0.8rem;
  cursor: pointer;
  transition: all 0.15s;
  user-select: none;
}

.tone-chip:hover {
  border-color: var(--text-muted);
  color: var(--text);
}

.tone-chip.active {
  background: var(--accent);
  border-color: var(--accent);
  color: #fff;
}

/* Platform toggles */
.platform-chips {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
}

.platform-chip {
  padding: 7px 14px;
  border: 1px solid var(--border);
  border-radius: 20px;
  background: transparent;
  color: var(--text-dim);
  font-family: var(--font-body);
  font-size: 0.8rem;
  cursor: pointer;
  transition: all 0.2s;
  user-select: none;
  display: flex;
  align-items: center;
  gap: 6px;
}

.platform-chip .p-icon { font-size: 0.9rem; }

.platform-chip:hover { border-color: var(--text-muted); }

.platform-chip.active[data-platform="twitter"] { background: var(--twitter); border-color: var(--twitter); color: #fff; }
.platform-chip.active[data-platform="linkedin"] { background: var(--linkedin); border-color: var(--linkedin); color: #fff; }
.platform-chip.active[data-platform="instagram"] { background: linear-gradient(135deg, var(--instagram-1), var(--instagram-2), var(--instagram-3)); border-color: var(--instagram-2); color: #fff; }
.platform-chip.active[data-platform="telegram"] { background: var(--telegram); border-color: var(--telegram); color: #fff; }
.platform-chip.active[data-platform="tiktok"] { background: linear-gradient(135deg, var(--tiktok-cyan), var(--tiktok-pink)); border-color: var(--tiktok-pink); color: #fff; }

.tags-input {
  width: 100%;
  padding: 9px 14px;
  background: var(--bg-input);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  color: var(--text);
  font-family: var(--font-body);
  font-size: 0.85rem;
  outline: none;
  transition: border-color 0.2s;
}

.tags-input:focus { border-color: var(--accent); }
.tags-input::placeholder { color: var(--text-muted); }

.model-picker { position: relative; }
.model-search {
  width: 100%;
  padding: 9px 14px;
  background: var(--bg-input);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  color: var(--text);
  font-family: var(--font-mono);
  font-size: 0.8rem;
  outline: none;
  transition: border-color 0.2s;
}
.model-search:focus { border-color: var(--accent); }
.model-search::placeholder { color: var(--text-muted); }
.model-dropdown {
  position: absolute;
  top: 100%;
  left: 0;
  right: 0;
  margin-top: 4px;
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  max-height: 240px;
  overflow-y: auto;
  z-index: 50;
}
.model-option {
  padding: 8px 14px;
  font-family: var(--font-mono);
  font-size: 0.75rem;
  color: var(--text-dim);
  cursor: pointer;
  transition: background 0.1s;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.model-option:hover { background: rgba(255,255,255,0.05); color: var(--text); }
.model-option.selected { background: rgba(255,107,53,0.1); color: var(--accent); }

.results-model-badge {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 5px 12px;
  background: rgba(255,255,255,0.04);
  border: 1px solid var(--border);
  border-radius: 6px;
  font-family: var(--font-mono);
  font-size: 0.7rem;
  color: var(--text-dim);
  margin-bottom: 14px;
}
.results-model-badge .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--success); }

.composer-actions {
  display: flex;
  justify-content: flex-end;
  margin-top: 22px;
}

.btn-split {
  padding: 14px 40px;
  background: var(--accent);
  color: #fff;
  border: none;
  border-radius: var(--radius-sm);
  font-family: var(--font-display);
  font-weight: 700;
  font-size: 1rem;
  letter-spacing: 0.5px;
  cursor: pointer;
  transition: all 0.2s;
  position: relative;
  overflow: hidden;
  display: flex;
  align-items: center;
  gap: 10px;
}

.btn-split:hover {
  background: #ff7d4d;
  transform: translateY(-1px);
  box-shadow: 0 6px 24px rgba(255,107,53,0.3);
}

.btn-split:active { transform: translateY(0); }

.btn-split:disabled {
  opacity: 0.5;
  cursor: not-allowed;
  transform: none !important;
  box-shadow: none !important;
}

.btn-split.loading {
  pointer-events: none;
}

.btn-split.loading .btn-text { opacity: 0; }

.btn-split.loading::after {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,0.25), transparent);
  animation: shimmer 1.2s infinite;
}

.split-icon { font-size: 1.2rem; }

/* ═══ RESULTS GRID ═══ */
.results-section {
  margin-top: 8px;
}

.results-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(380px, 1fr));
  gap: 16px;
}

/* ═══ PLATFORM CARD ═══ */
.platform-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 12px;
  overflow: hidden;
  animation: cardIn 0.5s cubic-bezier(0.16, 1, 0.3, 1) backwards;
  transition: border-color 0.2s, box-shadow 0.2s;
}

.platform-card:hover {
  border-color: var(--border-focus);
  box-shadow: 0 4px 24px rgba(0,0,0,0.3);
}

.platform-card:nth-child(1) { animation-delay: 0.05s; }
.platform-card:nth-child(2) { animation-delay: 0.1s; }
.platform-card:nth-child(3) { animation-delay: 0.15s; }
.platform-card:nth-child(4) { animation-delay: 0.2s; }
.platform-card:nth-child(5) { animation-delay: 0.25s; }

@keyframes cardIn {
  from { opacity: 0; transform: translateY(20px); }
  to { opacity: 1; transform: translateY(0); }
}

.card-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 14px 18px;
  border-bottom: 1px solid var(--border);
}

.card-platform {
  display: flex;
  align-items: center;
  gap: 10px;
}

.card-platform-icon {
  width: 30px;
  height: 30px;
  border-radius: 8px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 1rem;
  font-weight: 600;
}

.card-platform-icon.twitter { background: rgba(29,161,242,0.15); color: var(--twitter); }
.card-platform-icon.linkedin { background: rgba(10,102,194,0.15); color: var(--linkedin); }
.card-platform-icon.instagram { background: linear-gradient(135deg, rgba(247,119,55,0.15), rgba(193,53,132,0.15)); color: var(--instagram-2); }
.card-platform-icon.telegram { background: rgba(38,165,228,0.15); color: var(--telegram); }
.card-platform-icon.tiktok { background: rgba(254,44,85,0.12); color: var(--tiktok-pink); }

.card-platform-name {
  font-family: var(--font-display);
  font-weight: 700;
  font-size: 0.85rem;
  letter-spacing: -0.3px;
}

.card-copy-btn {
  padding: 6px 14px;
  background: rgba(255,255,255,0.05);
  border: 1px solid var(--border);
  border-radius: 6px;
  color: var(--text-dim);
  font-family: var(--font-mono);
  font-size: 0.7rem;
  cursor: pointer;
  transition: all 0.15s;
  display: flex;
  align-items: center;
  gap: 5px;
}

.card-copy-btn:hover {
  background: rgba(255,255,255,0.08);
  color: var(--text);
  border-color: var(--border-focus);
}

.card-copy-btn.copied {
  background: rgba(52,211,153,0.1);
  border-color: var(--success);
  color: var(--success);
  animation: copyPulse 0.4s ease;
}

@keyframes copyPulse {
  0% { transform: scale(1); }
  50% { transform: scale(1.05); }
  100% { transform: scale(1); }
}

.card-body {
  padding: 16px 18px;
}

.card-content {
  font-family: var(--font-mono);
  font-size: 0.78rem;
  line-height: 1.75;
  color: var(--text);
  white-space: pre-wrap;
  word-break: break-word;
  max-height: 240px;
  overflow-y: auto;
}

.card-footer {
  padding: 12px 18px;
  border-top: 1px solid var(--border);
}

/* Character bar */
.char-bar-container {
  margin-bottom: 10px;
}

.char-bar-info {
  display: flex;
  justify-content: space-between;
  font-family: var(--font-mono);
  font-size: 0.65rem;
  color: var(--text-muted);
  margin-bottom: 5px;
}

.char-bar {
  height: 5px;
  background: rgba(255,255,255,0.06);
  border-radius: 3px;
  overflow: hidden;
  position: relative;
}

.char-bar-fill {
  height: 100%;
  border-radius: 3px;
  transition: width 0.6s cubic-bezier(0.16, 1, 0.3, 1);
  position: relative;
}

.char-bar-fill.green { background: var(--success); box-shadow: 0 0 8px rgba(52,211,153,0.3); }
.char-bar-fill.yellow { background: var(--warning); box-shadow: 0 0 8px rgba(251,191,36,0.3); }
.char-bar-fill.red { background: var(--danger); box-shadow: 0 0 8px rgba(248,113,113,0.3); }

.char-bar-fill.red::after {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
  animation: shimmer 2s infinite;
}

/* Hashtags */
.card-hashtags {
  display: flex;
  flex-wrap: wrap;
  gap: 5px;
}

.hashtag {
  padding: 3px 9px;
  background: rgba(255,255,255,0.04);
  border: 1px solid var(--border);
  border-radius: 4px;
  font-family: var(--font-mono);
  font-size: 0.65rem;
  color: var(--text-dim);
}

.card-warnings {
  margin-top: 8px;
}

.warning-badge {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  padding: 3px 9px;
  background: rgba(251,191,36,0.08);
  border: 1px solid rgba(251,191,36,0.2);
  border-radius: 4px;
  font-family: var(--font-mono);
  font-size: 0.65rem;
  color: var(--warning);
}

/* ═══ LOADING SKELETON ═══ */
.skeleton-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(380px, 1fr));
  gap: 16px;
}

.skeleton-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 12px;
  height: 280px;
  overflow: hidden;
  position: relative;
  animation: cardIn 0.4s cubic-bezier(0.16, 1, 0.3, 1) backwards;
}

.skeleton-card:nth-child(1) { animation-delay: 0.05s; }
.skeleton-card:nth-child(2) { animation-delay: 0.1s; }
.skeleton-card:nth-child(3) { animation-delay: 0.15s; }
.skeleton-card:nth-child(4) { animation-delay: 0.2s; }
.skeleton-card:nth-child(5) { animation-delay: 0.25s; }

.skeleton-card::after {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(90deg, transparent 0%, rgba(255,255,255,0.03) 50%, transparent 100%);
  animation: shimmer 2s infinite;
}

.skeleton-header {
  height: 56px;
  border-bottom: 1px solid var(--border);
  padding: 14px 18px;
  display: flex;
  align-items: center;
  gap: 10px;
}

.skeleton-dot {
  width: 30px;
  height: 30px;
  border-radius: 8px;
  background: rgba(255,255,255,0.04);
}

.skeleton-line {
  height: 12px;
  border-radius: 4px;
  background: rgba(255,255,255,0.04);
}

.skeleton-body {
  padding: 18px;
  display: flex;
  flex-direction: column;
  gap: 10px;
}

/* ═══ HISTORY ═══ */
.history-list {
  display: flex;
  flex-direction: column;
  gap: 10px;
}

.history-item {
  background: var(--bg-elevated);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  overflow: hidden;
  cursor: pointer;
  transition: border-color 0.15s;
}

.history-item:hover {
  border-color: var(--border-focus);
}

.history-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 16px 20px;
}

.history-preview {
  flex: 1;
  overflow: hidden;
}

.history-text {
  font-size: 0.9rem;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  margin-bottom: 4px;
}

.history-meta {
  display: flex;
  gap: 12px;
  font-family: var(--font-mono);
  font-size: 0.7rem;
  color: var(--text-muted);
}

.history-expand-icon {
  color: var(--text-muted);
  transition: transform 0.3s;
  flex-shrink: 0;
  font-size: 0.8rem;
}

.history-item.expanded .history-expand-icon {
  transform: rotate(180deg);
}

.history-body {
  max-height: 0;
  overflow: hidden;
  transition: max-height 0.4s cubic-bezier(0.16, 1, 0.3, 1);
}

.history-item.expanded .history-body {
  max-height: 2000px;
}

.history-adaptations {
  padding: 0 20px 20px;
  display: flex;
  flex-direction: column;
  gap: 12px;
}

.history-adaptation {
  background: var(--bg-input);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 14px;
}

.history-adaptation-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 10px;
}

.history-adaptation-platform {
  font-family: var(--font-display);
  font-weight: 700;
  font-size: 0.8rem;
  display: flex;
  align-items: center;
  gap: 8px;
}

.history-adaptation-content {
  font-family: var(--font-mono);
  font-size: 0.75rem;
  line-height: 1.7;
  color: var(--text-dim);
  white-space: pre-wrap;
}

/* ═══ EMPTY STATE ═══ */
.empty-state {
  text-align: center;
  padding: 80px 20px;
  color: var(--text-muted);
}

.empty-icon {
  font-size: 3rem;
  margin-bottom: 16px;
  opacity: 0.3;
}

.empty-state h3 {
  font-family: var(--font-display);
  font-weight: 700;
  font-size: 1.3rem;
  color: var(--text-dim);
  margin-bottom: 8px;
}

.empty-state p {
  font-size: 0.85rem;
  max-width: 340px;
  margin: 0 auto;
  line-height: 1.6;
}

/* ═══ TOAST ═══ */
.toast-container {
  position: fixed;
  bottom: 24px;
  right: 24px;
  z-index: 10000;
  display: flex;
  flex-direction: column;
  gap: 8px;
}

.toast {
  padding: 12px 20px;
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 10px;
  font-family: var(--font-body);
  font-size: 0.85rem;
  display: flex;
  align-items: center;
  gap: 10px;
  animation: toastIn 0.4s cubic-bezier(0.16, 1, 0.3, 1);
  box-shadow: 0 8px 30px rgba(0,0,0,0.4);
  max-width: 360px;
}

.toast.success { border-left: 3px solid var(--success); }
.toast.error { border-left: 3px solid var(--danger); }

.toast-exit {
  animation: toastOut 0.3s ease forwards;
}

@keyframes toastIn {
  from { opacity: 0; transform: translateX(40px); }
  to { opacity: 1; transform: translateX(0); }
}

@keyframes toastOut {
  to { opacity: 0; transform: translateX(40px); }
}

/* ═══ RESPONSIVE ═══ */
@media (max-width: 768px) {
  .app-layout { grid-template-columns: 1fr; }
  .sidebar {
    position: fixed;
    left: -260px;
    transition: left 0.3s;
    z-index: 200;
  }
  .sidebar.open { left: 0; }
  .main-content { margin-left: 0; padding: 20px 16px; }
  .mobile-header {
    display: flex !important;
    align-items: center;
    gap: 12px;
    margin-bottom: 20px;
  }
  .mobile-hamburger {
    width: 36px;
    height: 36px;
    background: var(--bg-elevated);
    border: 1px solid var(--border);
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    color: var(--text);
    font-size: 1.1rem;
  }
  .results-grid, .skeleton-grid { grid-template-columns: 1fr; }
  .composer-options { flex-direction: column; }
  .mobile-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.6);
    z-index: 150;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.3s;
  }
  .mobile-overlay.active { opacity: 1; pointer-events: auto; }
}

@media (min-width: 769px) {
  .mobile-header { display: none !important; }
  .mobile-overlay { display: none !important; }
}

/* ═══ HIDDEN ═══ */
.hidden { display: none !important; }
</style>
</head>
<body>

<!-- ═══ TOASTS ═══ -->
<div class="toast-container" id="toasts"></div>

<!-- ═══ AUTH SCREEN ═══ -->
<div id="authScreen" class="auth-screen">
  <div class="auth-bg"></div>
  <div class="auth-grid-lines"></div>
  <div class="auth-container">
    <div class="auth-logo">
      <h1>SplitPost</h1>
      <div class="tagline">One post → every platform</div>
    </div>
    <div class="auth-box">
      <div class="auth-tabs">
        <button class="auth-tab active" data-tab="login">Sign In</button>
        <button class="auth-tab" data-tab="register">Create Account</button>
      </div>

      <form id="loginForm">
        <div class="form-group">
          <label>Email</label>
          <input type="email" id="loginEmail" placeholder="you@example.com" required>
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" id="loginPassword" placeholder="••••••••" required>
        </div>
        <button type="submit" class="btn-primary" id="loginBtn">Sign In</button>
      </form>

      <form id="registerForm" class="hidden">
        <div class="form-group">
          <label>Username</label>
          <input type="text" id="regUsername" placeholder="yourname" required>
        </div>
        <div class="form-group">
          <label>Email</label>
          <input type="email" id="regEmail" placeholder="you@example.com" required>
        </div>
        <div class="form-group">
          <label>Display Name</label>
          <input type="text" id="regDisplayName" placeholder="Your Name">
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" id="regPassword" placeholder="Min 6 characters" required>
        </div>
        <button type="submit" class="btn-primary" id="regBtn">Create Account</button>
      </form>
    </div>
  </div>
</div>

<!-- ═══ APP ═══ -->
<div id="appScreen" class="hidden">
  <div class="mobile-overlay" id="mobileOverlay"></div>
  <div class="app-layout">
    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-logo">
        <h2>Split<span>Post</span></h2>
      </div>
      <nav class="sidebar-nav">
        <div class="nav-item active" data-view="split">
          <span class="icon">⚡</span> Split
        </div>
        <div class="nav-item" data-view="history">
          <span class="icon">⏱</span> History
        </div>
      </nav>
      <div class="sidebar-user">
        <div class="user-avatar" id="userAvatar">U</div>
        <div class="user-info">
          <div class="user-name" id="userName">User</div>
          <div class="user-signout" id="signOut">Sign out</div>
        </div>
      </div>
    </aside>

    <!-- Content -->
    <main class="main-content">
      <div class="mobile-header">
        <div class="mobile-hamburger" id="hamburger">☰</div>
        <h2 style="font-family:var(--font-display);font-weight:800;font-size:1.2rem;">Split<span style="color:var(--accent)">Post</span></h2>
      </div>

      <!-- SPLIT VIEW -->
      <div id="splitView">
        <div class="page-header">
          <h1>Split your content</h1>
          <p>Write once. Publish everywhere. AI adapts your voice for each platform.</p>
        </div>

        <div class="composer">
          <textarea class="composer-textarea" id="contentInput" placeholder="Paste your content here — a blog excerpt, an idea, a thread, an announcement. AI will reshape it for every platform you choose."></textarea>
          <div class="composer-char-count"><span id="charCount">0</span> characters</div>

          <div class="composer-options">
            <div class="option-group">
              <div class="option-label">Tone</div>
              <div class="tone-chips" id="toneChips">
                <button class="tone-chip active" data-tone="professional">Professional</button>
                <button class="tone-chip" data-tone="casual">Casual</button>
                <button class="tone-chip" data-tone="viral">Viral</button>
                <button class="tone-chip" data-tone="witty">Witty</button>
                <button class="tone-chip" data-tone="academic">Academic</button>
              </div>
            </div>

            <div class="option-group">
              <div class="option-label">Platforms</div>
              <div class="platform-chips" id="platformChips">
                <button class="platform-chip active" data-platform="twitter"><span class="p-icon">𝕏</span> Twitter</button>
                <button class="platform-chip active" data-platform="linkedin"><span class="p-icon">in</span> LinkedIn</button>
                <button class="platform-chip active" data-platform="instagram"><span class="p-icon">📸</span> Instagram</button>
                <button class="platform-chip active" data-platform="telegram"><span class="p-icon">✈️</span> Telegram</button>
                <button class="platform-chip active" data-platform="tiktok"><span class="p-icon">🎬</span> TikTok</button>
              </div>
            </div>

            <div class="option-group" style="min-width:160px;">
              <div class="option-label">Tags</div>
              <input class="tags-input" id="tagsInput" placeholder="marketing, launch, ai…">
            </div>

            <div class="option-group" style="min-width:240px;">
              <div class="option-label">Model (free)</div>
              <div class="model-picker" id="modelPicker">
                <input class="model-search" id="modelSearch" placeholder="Search models..." autocomplete="off">
                <div class="model-dropdown hidden" id="modelDropdown"></div>
                <input type="hidden" id="modelSelect">
              </div>
            </div>
          </div>

          <div class="composer-actions">
            <button class="btn-split" id="splitBtn">
              <span class="split-icon">⚡</span>
              <span class="btn-text">Split it</span>
            </button>
          </div>
        </div>

        <!-- Results -->
        <div class="results-section" id="resultsSection"></div>
      </div>

      <!-- HISTORY VIEW -->
      <div id="historyView" class="hidden">
        <div class="page-header">
          <h1>History</h1>
          <p>All your previous splits, ready to re-use or copy.</p>
        </div>
        <div id="historyList"></div>
      </div>
    </main>
  </div>
</div>

<script>
const API = '';
let token = localStorage.getItem('sp_token');
let currentUser = null;
let currentTone = 'professional';
let activePlatforms = new Set(['twitter', 'linkedin', 'instagram', 'telegram', 'tiktok']);
let availableModels = [];
let defaultModel = '';

const PLATFORM_META = {
  twitter:   { name: 'Twitter / X', icon: '𝕏', limit: 280 },
  linkedin:  { name: 'LinkedIn', icon: 'in', limit: 3000 },
  instagram: { name: 'Instagram', icon: '📸', limit: 2200 },
  telegram:  { name: 'Telegram', icon: '✈️', limit: 4096 },
  tiktok:    { name: 'TikTok', icon: '🎬', limit: 2200 },
};

// ═══ HELPERS ═══
async function api(path, opts = {}) {
  const headers = { 'Content-Type': 'application/json', ...(opts.headers || {}) };
  if (token) headers['Authorization'] = `Bearer ${token}`;
  const resp = await fetch(API + path, { ...opts, headers });
  if (!resp.ok) {
    const err = await resp.json().catch(() => ({}));
    throw new Error(err.detail || `Error ${resp.status}`);
  }
  return resp.json();
}

function toast(msg, type = 'success') {
  const el = document.createElement('div');
  el.className = `toast ${type}`;
  el.innerHTML = `<span>${type === 'success' ? '✓' : '✗'}</span><span>${msg}</span>`;
  document.getElementById('toasts').appendChild(el);
  setTimeout(() => { el.classList.add('toast-exit'); setTimeout(() => el.remove(), 300); }, 3000);
}

// ═══ AUTH ═══
document.querySelectorAll('.auth-tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.auth-tab').forEach(t => t.classList.remove('active'));
    tab.classList.add('active');
    const isLogin = tab.dataset.tab === 'login';
    document.getElementById('loginForm').classList.toggle('hidden', !isLogin);
    document.getElementById('registerForm').classList.toggle('hidden', isLogin);
  });
});

document.getElementById('loginForm').addEventListener('submit', async e => {
  e.preventDefault();
  const btn = document.getElementById('loginBtn');
  btn.classList.add('loading');
  try {
    const data = await api('/auth/login', {
      method: 'POST',
      body: JSON.stringify({
        email: document.getElementById('loginEmail').value,
        password: document.getElementById('loginPassword').value,
      }),
    });
    token = data.access_token;
    localStorage.setItem('sp_token', token);
    currentUser = data.user;
    showApp();
    toast('Welcome back!');
  } catch (err) {
    toast(err.message, 'error');
  } finally { btn.classList.remove('loading'); }
});

document.getElementById('registerForm').addEventListener('submit', async e => {
  e.preventDefault();
  const btn = document.getElementById('regBtn');
  btn.classList.add('loading');
  try {
    const data = await api('/auth/register', {
      method: 'POST',
      body: JSON.stringify({
        username: document.getElementById('regUsername').value,
        email: document.getElementById('regEmail').value,
        display_name: document.getElementById('regDisplayName').value,
        password: document.getElementById('regPassword').value,
      }),
    });
    token = data.access_token;
    localStorage.setItem('sp_token', token);
    currentUser = data.user;
    showApp();
    toast('Account created!');
  } catch (err) {
    toast(err.message, 'error');
  } finally { btn.classList.remove('loading'); }
});

// ═══ APP INIT ═══
async function loadModels() {
  try {
    const cfg = await api('/posts/config');
    availableModels = cfg.models || [];
    defaultModel = cfg.default_model || '';
    document.getElementById('modelSelect').value = defaultModel;
    const def = availableModels.find(m => m.id === defaultModel);
    document.getElementById('modelSearch').value = def ? def.name : defaultModel;
    renderModelDropdown('');
  } catch {}
}

function renderModelDropdown(query) {
  const dd = document.getElementById('modelDropdown');
  const q = query.toLowerCase();
  const filtered = q ? availableModels.filter(m => m.name.toLowerCase().includes(q) || m.id.toLowerCase().includes(q)) : availableModels;
  const selected = document.getElementById('modelSelect').value;
  dd.innerHTML = filtered.slice(0, 50).map(m =>
    `<div class="model-option ${m.id === selected ? 'selected' : ''}" data-id="${m.id}">${m.name}</div>`
  ).join('') || '<div class="model-option" style="color:var(--text-muted);pointer-events:none">No models found</div>';
}

document.getElementById('modelSearch').addEventListener('focus', () => {
  document.getElementById('modelDropdown').classList.remove('hidden');
  renderModelDropdown(document.getElementById('modelSearch').value);
});
document.getElementById('modelSearch').addEventListener('input', e => {
  document.getElementById('modelDropdown').classList.remove('hidden');
  renderModelDropdown(e.target.value);
});
document.getElementById('modelDropdown').addEventListener('click', e => {
  const opt = e.target.closest('.model-option');
  if (!opt || !opt.dataset.id) return;
  document.getElementById('modelSelect').value = opt.dataset.id;
  document.getElementById('modelSearch').value = opt.textContent;
  document.getElementById('modelDropdown').classList.add('hidden');
});
document.addEventListener('click', e => {
  if (!e.target.closest('#modelPicker')) document.getElementById('modelDropdown').classList.add('hidden');
});

async function showApp() {
  if (!currentUser) {
    try { currentUser = await api('/auth/me'); } catch { return signOut(); }
  }
  document.getElementById('authScreen').classList.add('hidden');
  document.getElementById('appScreen').classList.remove('hidden');
  document.getElementById('userName').textContent = currentUser.display_name || currentUser.username;
  document.getElementById('userAvatar').textContent = (currentUser.display_name || currentUser.username)[0].toUpperCase();
  loadModels();
}

function signOut() {
  token = null;
  currentUser = null;
  localStorage.removeItem('sp_token');
  document.getElementById('appScreen').classList.add('hidden');
  document.getElementById('authScreen').classList.remove('hidden');
}

document.getElementById('signOut').addEventListener('click', signOut);

// ═══ NAVIGATION ═══
document.querySelectorAll('.nav-item').forEach(item => {
  item.addEventListener('click', () => {
    document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
    item.classList.add('active');
    const view = item.dataset.view;
    document.getElementById('splitView').classList.toggle('hidden', view !== 'split');
    document.getElementById('historyView').classList.toggle('hidden', view !== 'history');
    if (view === 'history') loadHistory();
    closeMobile();
  });
});

// ═══ MOBILE ═══
document.getElementById('hamburger').addEventListener('click', () => {
  document.getElementById('sidebar').classList.add('open');
  document.getElementById('mobileOverlay').classList.add('active');
});
document.getElementById('mobileOverlay').addEventListener('click', closeMobile);
function closeMobile() {
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('mobileOverlay').classList.remove('active');
}

// ═══ COMPOSER ═══
const contentInput = document.getElementById('contentInput');
contentInput.addEventListener('input', () => {
  document.getElementById('charCount').textContent = contentInput.value.length;
});

// Tone chips
document.querySelectorAll('.tone-chip').forEach(chip => {
  chip.addEventListener('click', () => {
    document.querySelectorAll('.tone-chip').forEach(c => c.classList.remove('active'));
    chip.classList.add('active');
    currentTone = chip.dataset.tone;
  });
});

// Platform chips
document.querySelectorAll('.platform-chip').forEach(chip => {
  chip.addEventListener('click', () => {
    const p = chip.dataset.platform;
    chip.classList.toggle('active');
    if (chip.classList.contains('active')) activePlatforms.add(p);
    else activePlatforms.delete(p);
  });
});

// ═══ SPLIT ACTION ═══
document.getElementById('splitBtn').addEventListener('click', async () => {
  const text = contentInput.value.trim();
  if (!text) return toast('Write something first', 'error');
  if (activePlatforms.size === 0) return toast('Select at least one platform', 'error');

  const btn = document.getElementById('splitBtn');
  btn.classList.add('loading');
  btn.disabled = true;

  const resultsSection = document.getElementById('resultsSection');
  const skeletonCount = activePlatforms.size;
  resultsSection.innerHTML = `<div class="skeleton-grid">${Array(skeletonCount).fill('').map(() => `
    <div class="skeleton-card">
      <div class="skeleton-header"><div class="skeleton-dot"></div><div class="skeleton-line" style="width:80px"></div></div>
      <div class="skeleton-body">
        <div class="skeleton-line" style="width:90%"></div>
        <div class="skeleton-line" style="width:75%"></div>
        <div class="skeleton-line" style="width:85%"></div>
        <div class="skeleton-line" style="width:60%"></div>
      </div>
    </div>
  `).join('')}</div>`;

  try {
    const selectedModel = document.getElementById('modelSelect').value;
    const data = await api('/posts/split', {
      method: 'POST',
      body: JSON.stringify({
        text,
        tone: currentTone,
        platforms: [...activePlatforms],
        tags: document.getElementById('tagsInput').value,
        model: selectedModel,
      }),
    });
    renderResults(data.adaptations, data.model);
    toast(`Split into ${data.adaptations.length} platforms`);
  } catch (err) {
    resultsSection.innerHTML = '';
    toast(err.message, 'error');
  } finally {
    btn.classList.remove('loading');
    btn.disabled = false;
  }
});

function renderResults(adaptations, model) {
  const section = document.getElementById('resultsSection');
  const modelName = availableModels.find(m => m.id === model)?.name || model || '';
  const badge = model ? `<div class="results-model-badge"><span class="dot"></span>${modelName}</div>` : '';
  section.innerHTML = `${badge}<div class="results-grid">${adaptations.map(a => {
    const meta = PLATFORM_META[a.platform] || {};
    const pct = Math.min((a.char_count / a.char_limit) * 100, 100);
    const barColor = pct < 70 ? 'green' : pct < 90 ? 'yellow' : 'red';
    const hashtags = (a.hashtags || []).map(h => `<span class="hashtag">${h.startsWith('#') ? h : '#' + h}</span>`).join('');
    const warnings = (a.warnings || []).map(w => `<div class="warning-badge">⚠ ${w}</div>`).join('');

    return `
      <div class="platform-card">
        <div class="card-header">
          <div class="card-platform">
            <div class="card-platform-icon ${a.platform}">${meta.icon || '?'}</div>
            <span class="card-platform-name">${meta.name || a.platform}</span>
          </div>
          <button class="card-copy-btn" onclick="copyContent(this, \`${encodeURIComponent(a.content)}\`)">
            <span class="copy-label">Copy</span>
          </button>
        </div>
        <div class="card-body">
          <div class="card-content">${escapeHtml(a.content)}</div>
        </div>
        <div class="card-footer">
          <div class="char-bar-container">
            <div class="char-bar-info">
              <span>${a.char_count} chars</span>
              <span>${a.char_limit} limit</span>
            </div>
            <div class="char-bar">
              <div class="char-bar-fill ${barColor}" style="width:${pct}%"></div>
            </div>
          </div>
          ${hashtags ? `<div class="card-hashtags">${hashtags}</div>` : ''}
          ${warnings ? `<div class="card-warnings">${warnings}</div>` : ''}
        </div>
      </div>`;
  }).join('')}</div>`;
}

function escapeHtml(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function copyContent(btn, encoded) {
  const text = decodeURIComponent(encoded);
  navigator.clipboard.writeText(text).then(() => {
    btn.classList.add('copied');
    btn.querySelector('.copy-label').textContent = 'Copied!';
    toast('Copied to clipboard');
    setTimeout(() => {
      btn.classList.remove('copied');
      btn.querySelector('.copy-label').textContent = 'Copy';
    }, 2000);
  });
}

// ═══ HISTORY ═══
async function loadHistory() {
  const container = document.getElementById('historyList');
  try {
    const posts = await api('/posts/');
    if (!posts.length) {
      container.innerHTML = `
        <div class="empty-state">
          <div class="empty-icon">⏱</div>
          <h3>No splits yet</h3>
          <p>Your split history will appear here. Go create your first one!</p>
        </div>`;
      return;
    }
    container.innerHTML = `<div class="history-list">${posts.map(p => `
      <div class="history-item" data-id="${p.id}">
        <div class="history-header" onclick="toggleHistory(this.parentElement)">
          <div class="history-preview">
            <div class="history-text">${escapeHtml(p.original_text.substring(0, 120))}${p.original_text.length > 120 ? '…' : ''}</div>
            <div class="history-meta">
              <span>${new Date(p.created_at).toLocaleDateString('en', { month:'short', day:'numeric', hour:'2-digit', minute:'2-digit' })}</span>
              <span>${p.platform_count} platforms</span>
              <span style="text-transform:capitalize">${p.tone}</span>
            </div>
          </div>
          <span class="history-expand-icon">▾</span>
        </div>
        <div class="history-body">
          <div class="history-adaptations" id="adapt-${p.id}"></div>
        </div>
      </div>
    `).join('')}</div>`;
  } catch (err) {
    toast(err.message, 'error');
  }
}

async function toggleHistory(el) {
  const wasExpanded = el.classList.contains('expanded');
  el.classList.toggle('expanded');

  if (!wasExpanded) {
    const id = el.dataset.id;
    const container = document.getElementById(`adapt-${id}`);
    if (container.children.length === 0) {
      try {
        const post = await api(`/posts/${id}`);
        container.innerHTML = post.adaptations.map(a => {
          const meta = PLATFORM_META[a.platform] || {};
          return `
            <div class="history-adaptation">
              <div class="history-adaptation-header">
                <span class="history-adaptation-platform">
                  <span>${meta.icon || '?'}</span> ${meta.name || a.platform}
                </span>
                <button class="card-copy-btn" onclick="event.stopPropagation();copyContent(this, '${encodeURIComponent(a.content)}')">
                  <span class="copy-label">Copy</span>
                </button>
              </div>
              <div class="history-adaptation-content">${escapeHtml(a.content)}</div>
            </div>`;
        }).join('');
      } catch (err) {
        container.innerHTML = `<p style="color:var(--danger);padding:12px">Failed to load</p>`;
      }
    }
  }
}

// ═══ BOOT ═══
if (token) showApp();
</script>
